            { year: 2025, country: "Itaalia", city: "Bologna", lat: 44.4949, lng: 11.3426, title: "Itaalia", desc: "Raamatuaasta patroonina avas president Alar Karis Bolognas maailma suurima laste- ja noortekirjanduse messi, kus Eesti on tänavu peakülalise staatuses. Koos kultuuriminister Heidy Purgaga väisatud suurürituse peamine eesmärk on tutvustada kodumaist loomingut professionaalidele ja väliskirjastajatele, et edendada Eesti lasteraamatute tõlkimist teistesse keeltesse. Kirjandusliku programmi kõrval kohtus riigipea ka Bologna linnapea Matteo Leporega, tegi sissekande linna ajaloolisse külalisraamatusse ning külastas Palazzo d'Accursios avatud illustratsiooninäitust.", image: "https://placehold.co/600x400/d84315/ffffff?text=Bologna" },
            { year: 2025, country: "Itaalia", city: "Rooma", lat: 41.9028, lng: 12.4964, title: "Itaalia", desc: "President Alar Karis kohtus Roomas Itaalia riigipea Sergio Mattarellaga, kellega arutati Euroopa solidaarsust rände- ja idapiiri kaitsmisel ning sügisest taas Ämaris algavat Itaalia õhuturbemissiooni. Lisaks kõrgetasemelistele julgeolekuaruteludele NATO Kaitsekolledžis ja Euroopa Liidu merepäästemissiooni IRINI peakorteris kohtus Karis Itaalia parlamendi alamkoja esimehega. Visiidi haridus- ja teadussuuna raames väisas president UnitelmaSapienza ülikooli, et kaardistada kahe riigi teadlaste ühiseid koostöövõimalusi digitehnoloogiate, tehisintellekti rakendamise ning uute ühisõppekavade vallas.", image: "https://placehold.co/600x400/d84315/ffffff?text=Rooma" },
            { year: 2025, country: "Vatikan", city: "Vatikan", lat: 41.9029, lng: 12.4534, title: "Vatikan", desc: "President Alar Karis kohtus Vatikani riigisekretäri kardinal Pietro Paroliniga, et tunnustada katoliku kiriku tegevust Eestis ning arutada Venemaa agressiooni ja Ukraina laste tagasitoomisega seotud diplomaatilisi küsimusi. Usuliste teemade raames käsitleti ka peapiiskop Eduard Profittlichi eelseisvat õndsaks kuulutamist ning Vatikani huvi pälvinud seadusloomet Vene õigeusu kiriku osas Eestis. Visiidi teises pooles külastas riigipea Rooma Sapienza ülikooli, pöörates tähelepanu sealsele teaduskoostööle Tallinna Tehnikaülikooliga materjaliteaduse, päikeseenergeetika ja satelliitide arendamise valdkonnas.", image: "https://placehold.co/600x400/d84315/ffffff?text=Vatikan" },
            { year: 2025, country: "Vatikan", city: "Vatikan", lat: 41.9029, lng: 12.4534, title: "Vatikan", desc: "President Alar Karis osales Vatikanis paavst Franciscuse matusetalitusel, jälgides tseremooniat kõrvuti USA presidendi Donald Trumpi ja esileedi Melaniaga. Riigipeade vahelises vestluses arutati Ukraina rahuprotsessi edendamist ning transatlantiliste suhete olulisust, misjärel vahetati ka vastastikused visiidikutsed Tallinnasse ja Washingtoni. Ülemaailmsete liidrite kogunemisel jõudis Eesti president lühidalt suhelda teistegi läheduses viibinud riigijuhtidega, sealhulgas Hispaania kuninga ning peagi Eestisse saabuva Portugali presidendiga.", image: "https://s.err.ee/photo/orig/2026/05/14/3578416hf691.jpg" },
            { year: 2025, country: "Poola", city: "Varssavi", lat: 52.2297, lng: 21.0122, title: "Poola", desc: "President Alar Karis rõhutas Varssavis toimuval Kolme mere algatuse tippkohtumisel piirkondlike taristuühenduste, sealhulgas Rail Baltica, ning digitaalse ja energiajulgeoleku kriitilist tähtsust Euroopa vastupanuvõime tagamisel. Lisaks strateegiliste ühenduste arendamisele arutas riigipea Horvaatia peaministri Andrej Plenkovićiga kaitsekoostööd, Ukraina edasist toetamist ja tutvustas Eesti kandidatuuri ÜRO Inimõiguste Nõukokku. Paralleelselt ametlike aruteludega uute investeeringute kaasamiseks regiooni taristuprojektidesse osales presidendi abikaasa Sirje Karis riigipeade kaasadele suunatud kultuuriprogrammis.", image: "https://placehold.co/600x400/d84315/ffffff?text=Varssavi" },
            { year: 2025, country: "Saksamaa", city: "Berliin", lat: 52.5200, lng: 13.4050, title: "Saksamaa", desc: "President Alar Karis rõhutas Saksimaal visiidil olles, et Euroopa konkurentsivõime päästmiseks ei piisa pelgalt tehnoloogilistest investeeringutest, vaid uued teadusavastused ja innovatsioon tuleb otseselt siduda reaalse tööstusega. Esindusliku äridelegatsiooniga reisinud riigipea tutvus kohalikul turul kanda kinnitavate Eesti ettevõtetega, avades muuhulgas Nortali uued kontoriruumid ning vaadates üle Leipzigi lähistel valmiva Skeletoni tehase. Majandus- ja tehnoloogiasidemete turgutamise kõrval põigati koos kaasasolnud kultuuritegelastega Euroopa kultuuripealinna Chemnitzisse, et hoida üleval kahe riigi vahelist kultuuridiplomaatiat.", image: "https://placehold.co/600x400/d84315/ffffff?text=Berliin" },
            { year: 2025, country: "Leedu", city: "Vilnius", lat: 54.6872, lng: 25.2797, title: "Leedu", desc: "President Alar Karis kohtus Vilniuses NATO idatiiva ja Põhjamaade liidritega, et panna paika eelseisva Haagi tippkohtumise sõjaplaan, mille keskmes on eesmärk kergitada alliansi liikmete kaitsekulutused viie protsendini SKP-st. Kohtumisel osalenud riigijuhid ja peasekretär Mark Rutte kinnitasid Ukraina vääramatut teed allianssi ning lubasid jätkata Venemaa kägistamist uute sanktsioonide ja külmutatud varade abil, nentides, et Moskva jääb Euroopale pikaajaliseks otseseks ohuks. Ühtlasi rõhutas Eesti riigipea, et kuigi Euroopa peab oma julgeoleku tagamisel senisest märksa suurema vastutuse võtma, on USA sõjaline katus regiooni heidutuses endiselt elutähtis.", image: "https://placehold.co/600x400/d84315/ffffff?text=Vilnius+B9" },
            { year: 2025, country: "Montenegro", city: "Podgorica", lat: 42.4304, lng: 19.2594, title: "Montenegro", desc: "President Alar Karis tegi ametliku visiidi Montenegrosse, kus kohtus riigipea Jakov Milatovićiga ning kinnitas Eesti igakülgset tuge Montenegro soovile liituda Euroopa Liiduga aastaks 2028. Kahe riigi poliitiliste ja diplomaatiliste suhete kõrval keskenduti praktilisele koostööle digiriigi arendamisel ja küberjulgeoleku tugevdamisel, mille edendamiseks väisas Karis ka kohalikku innovatsioonifondi ja valitsuse küberjulgeoleku keskust. Regiooni julgeolekust rääkides tunnustas Eesti riigipea Montenegro senist abi Ukrainale, aga rõhutas samas alliansi kaitsekulutuste tõstmise möödapääsmatust eelseisva NATO tippkohtumise valguses.", image: "https://placehold.co/600x400/d84315/ffffff?text=Montenegro" },
            { year: 2025, country: "Soome", city: "Kultaranta", lat: 60.4682, lng: 22.0000, title: "Soome", desc: "President Alar Karis osales Soomes Naantalis toimunud välispoliitika- ja julgeolekukonverentsil „Kultaranta Talks“, kus ta arutles koos Soome ja Läti riigipeadega Euroopa julgeolekuolukorra üle. Paneelarutelus rõhutas Karis vajadust leida ja sulgeda Venemaale kehtestatud sanktsioonidest kõrvalehoidmist võimaldavad hallid alad, et uued ja senised piirangud ka reaalsuses töötaksid. Samuti põhjendas Eesti riigipea lahkumist jalaväemiine keelustavast Ottawa konventsioonist, selgitades, et Venemaa ohu tõttu on see geograafiliselt piiratud ruumis vajalik riikliku heidutuse tagamiseks.", image: "https://placehold.co/600x400/d84315/ffffff?text=Kultaranta" },
            { year: 2025, country: "Hispaania", city: "Sevilla", lat: 37.3891, lng: -5.9845, title: "Hispaania", desc: "President Alar Karis osales Sevillas ÜRO arengurahastuse konverentsil, kus ta nentis, et pelga abiraha ootamise asemel peavad arenguriigid ise vastutuse võtma ning oma riigivalitsemise digitaliseerimise toel korda tegema. Kohtumisel ÜRO peasekretäri António Guterresega rõhutas Eesti riigipea vajadust organisatsiooni tõsiselt reformida, et tõkestada muuhulgas julgeolekunõukogu vetoõiguse kuritarvitamist. Globaalsete kriiside lahendamisel toonitas Karis Lähis-Ida relvarahu ja kahe riigi lahenduse möödapääsmatust ning Ukraina vankumatu toetamise jätkamist kuni Venemaa agressiooni lõppemiseni.", image: "https://s.err.ee/photo/orig/2026/05/14/3578419h5f49.jpg" },
            { year: 2025, country: "Šveits", city: "Genf", lat: 46.2044, lng: 6.1432, title: "Šveits", desc: "President Alar Karis kohtus Genfis ÜRO inimõiguste ülemvoliniku Volker Türkiga, et kinnitada Eesti tugevat panust inimõiguste kaitsesse ning tutvustada riigi kandidatuuri ÜRO Inimõiguste Nõukogusse. Rahvusvahelise Telekommunikatsiooni Liidu juhiga peetud arutelul võttis riigipea fookusesse Läänemere kriitilise taristu ja merealuste sidekaablite turvalisuse, rõhutades vajadust astuda rahvusvaheliselt otsustavamalt vastu Venemaa sagenevatele raadiosidehäiringutele. Visiidi raames kohtus Karis lisaks ÜRO kaubandus- ja arenguorganisatsiooni peasekretäri ning kümne riigi suursaadikuga, pakkudes Eesti digiriigi kogemust vahendina arengumaade majandusliku iseseisvuse tugevdamiseks.", image: "https://placehold.co/600x400/d84315/ffffff?text=Genf" },
            { year: 2025, country: "Läti", city: "Riia", lat: 56.9496, lng: 24.1052, title: "Läti", desc: "President Alar Karis tähistas 22. augustil koos Läti ametivenna Edgars Rinkēvičsiga eesti- ja lätikeelse raamatu 500. aastapäeva, võttes sel puhul piirialadel ette ühise jalgrattaretke. Oma teekonnal liikusid riigipead Läti Ramata külast Eestisse, väisates päeva jooksul nii kohalikku raamatukogu, Raamatu küla kui ka Mõisaküla. Pärast lühikest peatust Läti põhjapoolseimas kogunemispaigas jõudis presidentide meeleolukas ringsõit lõpule Ipiki külas asuvas Rein Sepa talus.", image: "https://placehold.co/600x400/d84315/ffffff?text=Raamatuküla" },
            { year: 2025, country: "Poola", city: "Varssavi", lat: 52.2297, lng: 21.0122, title: "Poola", desc: "President Alar Karis osales Varssavis Poola riigipea Karol Nawrocki kutsel kohtumisel Balti riikide, Taani ja Ukraina juhtidega, et arutada Euroopa kaitsevõime tugevdamist ning edasist toetust Ukrainale. Eesti riigipea rõhutas, et Euroopa peab võtma omaenda julgeoleku tagamisel senisest suurema juhtrolli, kutsudes NATO liitlasi üles tõstma kaitsekulutusi ja elavdama kiirkorras kaitsetööstust. Samuti toonitas Karis, et näiline vaherahu Venemaaga viib vaid uute agressioonideni, mistõttu on Ukraina püsiva rahu ja kindlate julgeolekugarantiide saavutamiseks hädavajalik jätkata tihedat koostööd Ameerika Ühendriikidega.", image: "https://placehold.co/600x400/d84315/ffffff?text=Varssavi+3B" },
            { year: 2025, country: "Sloveenia", city: "Ljubljana", lat: 46.0569, lng: 14.5058, title: "Sloveenia", desc: "President Alar Karis käis Sloveenias Bledi julgeolekukonverentsil meelde tuletamas, et väikeriikide jaoks pole reeglitel põhinev maailmakord pelk diplomaatiline paberimäärimine, vaid puhas eluküsimus. Arutelus Sloveenia, Tšehhi ja Montenegro riigipeadega rõhutas ta, et Euroopa peab Venemaa globaalsele lammutustööle vastu astuma poliitilise solidaarsuse ja jõulisemate tehnoloogiainvesteeringutega. Ühtlasi manitses Eesti riigipea lääneriike lõpetama Ukraina sõja käsitlemist lokaalse idaeurooplaste peavaluna, kuna reaalsuses on rünnaku all kogu senine demokraatlik süsteem.", image: "https://placehold.co/600x400/d84315/ffffff?text=Sloveenia" },
            { year: 2025, country: "Belgia", city: "Brüssel", lat: 50.8503, lng: 4.3517, title: "Belgia", desc: "President Alar Karis kohtus Brüsselis NATO peasekretäri Mark Ruttega, kinnitades Eesti plaani tõsta kaitsekulutused viie protsendini SKP-st ning näidates sellega teistele liitlastele eeskuju kollektiivkaitse tugevdamisel. Ukraina toetamisel lubas riigipea lüüa kaasa uues PURL-initsiatiivis, mille kaudu Euroopa riigid rahastavad Kiievile USA relvastuse ostmist, et kompenseerida Washingtoni enda finantseeringu peatumist. Kestva rahu tagamiseks rõhutas Karis vajadust sõnastada Ukrainale raudkindlad julgeolekugarantiid, lisades, et Eesti on valmis panustama oma kaitseväelastega ka tuleviku sõjajärgsesse rahuvalvejõudude koalitsiooni.", image: "https://placehold.co/600x400/d84315/ffffff?text=Brüssel" },
            { year: 2025, country: "USA", city: "New York", lat: 40.7128, lng: -74.0060, title: "USA", desc: "President Alar Karis hoiatas ÜRO peaassambleel peetud riigikõnes rahvusvahelisele õigusele tugineva maailmakorra murenemise eest, rõhutades vajadust säilitada tugev surve Venemaale ning leida Lähis-Ida konfliktile kestlik lahendus kahe riigi loomise kaudu. Globaalsete kriiside tõhusamaks lahendamiseks ja brutaalsuse võidutsemise vältimiseks pidas riigipea möödapääsmatuks ÜRO Julgeolekunõukogu laiaulatuslikku reformimist koos senise vetoõiguse piiramisega. Julgeolekuteemade kõrval osales Karis kõrgetasemelisel kliimakohtumisel, kus ta tutvustas kaasasolnud äridelegatsiooni toel Eesti digi- ja rohetehnoloogia ettevõtete lahendusi kui strateegilist vahendit kliimamuutuste pidurdamiseks ning energiajulgeoleku tagamiseks.", image: "https://s.err.ee/photo/orig/2026/05/14/3578476h9bb5.jpg" },
            { year: 2025, country: "Suurbritannia", city: "London", lat: 51.5074, lng: -0.1278, title: "Suurbritannia", desc: "President Alar Karis kohtus Windsori lossis Briti troonipärija prints Williamiga, kellega arutati kahe riigi teadus- ja tehnoloogiakoostööd ning tehisintellekti rakendamist haridussüsteemis. Eesti digiriigi kogemuste tutvustamise kõrval leidsid äramärkimist ka pikaajalised kultuurisidemed, mille tänavuseks peamiseks sümboliks on Arvo Pärdi juubeli tähistamine Ühendkuningriigi tipplavadel. Julgeolekuplokis tänas riigipea britte sõjalise kohaloleku eest Balti regioonis ning rõhutas, et Venemaa survestamine uute sanktsioonide ja külmutatud varade kasutuselevõtuga peab kestma Ukraina võiduni.", image: "https://s.err.ee/photo/orig/2026/05/14/3578398h4a50.jpg" },
            { year: 2025, country: "USA", city: "Chicago", lat: 41.8781, lng: -87.6298, title: "USA", desc: "President Alar Karis keskendus oma Ameerika Ühendriikide visiidil Eesti digiriigi ja tehisintellekti haridusprogrammide tutvustamisele, Euroopa julgeoleku tugevdamisele ning Arvo Pärdi muusika pühitsemisele. Koos esinduslike äri- ja loomemajanduse delegatsioonidega pidas riigipea loenguid Yale'i ja Chicago ülikoolides, kohtus kohalike linnapeade ning ÜRO tippjuhtidega ja arutas Atlandi-ülese tehnoloogiakoostöö süvendamist. Poliitiliste ja majanduslike arutelude kõrval kujunesid visiidi kultuuriliseks kõrgpunktiks väljamüüdud juubelikontserdid mainekas Carnegie Hallis, kus esitleti Ameerika publikule Eesti muusikakultuuri.", image: "https://s.err.ee/photo/orig/2026/05/14/3578482h458d.jpg" },
            { year: 2025, country: "Kasahstan", city: "Astana", lat: 51.1694, lng: 71.4491, title: "Kasahstan", desc: "President Alar Karis viibis esindusliku äri- ja haridusdelegatsiooniga riigivisiidil Kasahstanis, kohtudes sealse riigipea Kasõm-Žomart Tokajeviga, et tihendada kahe riigi majandussidemeid ning edendada koostööd hariduse ja digitehnoloogia vallas. Visiidi fookust varjutas aga diplomaatiline skandaal, kuna Eesti suursaadik Kasahstanis Jaap Ora soovitas presidendil avalikus kõnes Ukraina sõja teemat pehmendada, mis päädis terava kriitika ja suursaadiku ametist lahkumisega. Poliitiliste ja majanduslike arutelude kõrval pöörati tähelepanu ka kultuuridiplomaatiale, avades Astanas mitmeid Eesti pärandit tutvustavaid näitusi ning korraldades ühiseid akadeemilisi foorumeid.", image: "https://s.err.ee/photo/orig/2026/05/14/3578485h5f5c.jpg" },
            { year: 2025, country: "Läti", city: "Riia", lat: 56.9496, lng: 24.1052, title: "Läti", desc: "President Alar Karis kohtus Riias Läti ja Leedu riigipeadega, et arutada Balti riikide julgeolekukoostööd ning vajadust suunata kasvavad kaitsekulutused reaalse heidutuse ja NATO kollektiivkaitse tugevdamisse. Ühiselt rõhutati, et Ukraina sõjaline toetamine peab jätkuma piiranguteta ning Euroopa Liidu uus eelarve peab tagama lisarahastuse idatiiva kindlustamiseks Venemaa provokatsioonide vastu. Sõjaliste teemade kõrval käsitleti regionaalset taristut, tõstes esile Balti riikide edukat lahtiühendamist Veneaa elektrivõrgust, USA vedelgaasi osakaalu energiajulgeolekus ning Rail Baltica strateegilist tähtsust.", image: "https://placehold.co/600x400/d84315/ffffff?text=Riia+3B" }
        ];7

        const locationCounts = {};
        const formattedArcs = flightsData.map((data, index) => {
            const locKey = `${data.lat.toFixed(2)},${data.lng.toFixed(2)}`;
            if (!locationCounts[locKey]) locationCounts[locKey] = 0;
            const count = locationCounts[locKey]++;

            // Jitter algoritmi raadius, et vältida nuppude ja joonte kattumist samas linnas
            const angle = count * (Math.PI * 2 / 6);
            const offset = count > 0 ? 0.3 : 0; 

            const finalLat = data.lat + Math.cos(angle) * offset;
            const finalLng = data.lng + Math.sin(angle) * offset;

            return {
                ...data,
                originalIndex: index,
                startLat: TLL_LAT,
                startLng: TLL_LNG,
                endLat: finalLat,
                endLng: finalLng,
                color: data.year === 2026 ? COLOR_2026 : COLOR_2025,
                routeCode: `TLL -> ${data.city}`
            };
        });

        // Loome ookeani jaoks spetsiaalse helesinise materjali, 
        // et mandrite vahelt ei kumaks vaikimisi must värv.
        const customGlobeMaterial = new THREE.MeshPhongMaterial({
            color: '#adcceb',
            emissive: '#adcceb',
            emissiveIntensity: 0.1
        });

        const world = Globe()(document.getElementById('globeViz'))
            .backgroundColor('#adcceb')
            .showAtmosphere(true)
            .atmosphereColor('#bae6fd')
            .atmosphereAltitude(0.15)
            .globeMaterial(customGlobeMaterial) // Rakendame uue materjali
            // Lennujoonte seadistus
            .arcLabel(d => `${d.title} (${d.year})`)
            .arcStartLat(d => d.startLat)
            .arcStartLng(d => d.startLng)
            .arcEndLat(d => d.endLat)
            .arcEndLng(d => d.endLng)
            .arcColor('color')
            .arcAltitudeAutoScale(0.6) // Tõstame kaari, et vältida 3D lõikumisi
            .arcStroke(1.2) // Teeme jooned paksemaks nähtavuse jaoks
            // Sihtkohtade nuppude seadistus
            .pointLabel(d => `${d.title} (${d.year})`)
            .pointLat(d => d.endLat)
            .pointLng(d => d.endLng)
            .pointColor('color')
            .pointAltitude(0.002) // Väga madal, kohe maa pinnal
            .pointRadius(0.6) // Ümmargune nupp
            .pointResolution(32)
            // Interaktsioonid
            .onArcHover(hover => document.body.style.cursor = hover ? 'pointer' : 'grab')
            .onPointHover(hover => document.body.style.cursor = hover ? 'pointer' : 'grab')
            .onArcClick(arc => openModal(arc))
            .onPointClick(point => openModal(point))
            .onGlobeClick(() => closeModal())
            .onPolygonClick(() => closeModal());

        const controls = world.controls();
        controls.autoRotate = false;
        
        // PIIRANGUD IFRAME'I JAOKS:
        // 1. Piirame kaamera vertikaalse nurga nii, et fookus on ainult põhjapoolkeral (ekvaatorist alla minna ei saa)
        controls.maxPolarAngle = Math.PI / 2 + 0.05; // Math.PI / 2 on täpselt ekvaator (+0.05 annab veidi hingamisruumi)
        
        // 2. Piirame sisse/välja suumimise ulatust, et kasutaja ei kaotaks maakera silmist
        controls.maxDistance = 350; // Väldib lõputut kosmosesse suumimist (Globe.gl maaraadius on 100)
        controls.minDistance = 120; // Väldib liiga sügavale maa sisse suumimist

        // Seadistame vaikevaate Euroopa / Eesti kohale
        world.pointOfView({ lat: 54, lng: 22, altitude: 1.2 }, 0);

        fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
            .then(res => res.json())
            .then(countries => {
                world.polygonsData(countries.features)
                    .polygonCapColor(() => '#f9f3ea') 
                    .polygonSideColor(() => '#e8dccc')
                    .polygonStrokeColor(() => '#adcceb') // Piirjooned ookeaniga sama värvi, et vältida tumedaid pragusid
                    .polygonAltitude(0.001); 
            });

        let currentVisitIndex = -1;

        world.arcsData(formattedArcs).pointsData(formattedArcs);

        function openModal(data) {
            currentVisitIndex = data.originalIndex;
            populateModal(data);
            const modal = document.getElementById('infoModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Suumime valitud linnale lähemale
            world.pointOfView({ lat: data.endLat, lng: data.endLng, altitude: 0.9 }, 800);
        }

        function populateModal(data) {
            document.getElementById('modalTitle').textContent = data.title;
            const dateElem = document.getElementById('modalDate');
            dateElem.textContent = data.year;
            dateElem.style.color = data.year === 2026 ? COLOR_2026 : COLOR_2025;
            document.getElementById('modalDesc').textContent = data.description || data.desc;
            document.getElementById('modalImage').src = data.image;
            document.getElementById('modalRoute').textContent = data.routeCode;

            const hasPrev = currentVisitIndex > 0;
            const hasNext = currentVisitIndex < formattedArcs.length - 1;

            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            
            btnPrev.disabled = !hasPrev;
            btnPrev.style.opacity = hasPrev ? "1" : "0.4";
            btnPrev.style.cursor = hasPrev ? "pointer" : "not-allowed";
            
            btnNext.disabled = !hasNext;
            btnNext.style.opacity = hasNext ? "1" : "0.4";
            btnNext.style.cursor = hasNext ? "pointer" : "not-allowed";
        }

        function navigateModal(direction) {
            const newIndex = currentVisitIndex + direction;
            if (newIndex >= 0 && newIndex < formattedArcs.length) {
                openModal(formattedArcs[newIndex]);
            }
        }

        function closeModal() {
            const modal = document.getElementById('infoModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            currentVisitIndex = -1;
        }

        // Täisekraani loogika
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Viga täisekraani avamisel: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Jälgime täisekraani staatuse muutusi (nt kasutaja vajutab 'Esc')
        document.addEventListener('fullscreenchange', () => {
            const maxIcon = document.getElementById('icon-maximize');
            const minIcon = document.getElementById('icon-minimize');
            
            if (document.fullscreenElement) {
                // Oleme täisekraanil, näita vähendamise ikooni
                maxIcon.classList.add('hidden');
                minIcon.classList.remove('hidden');
            } else {
                // Väljusime täisekraanilt, näita suurendamise ikooni
                maxIcon.classList.remove('hidden');
                minIcon.classList.add('hidden');
            }
        });

        // Akna suuruse muutumise kuulaja graafiku kohandamiseks
        window.addEventListener('resize', () => {
            world.width(window.innerWidth).height(window.innerHeight);
        });
    </script>
</body>
</html>
