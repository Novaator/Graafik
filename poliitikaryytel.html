<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toetus Arnold Rüütlile</title>
    <!-- Google Fonts: Fira Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS baaskujunduseks -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lollikindlad ja minifitseeritud jsDelivr lingid -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    
    <style>
        body { 
            font-family: 'Fira Sans', sans-serif; 
            color: #333333;
        }
        
        /* Täisekraani CSS */
        #chartContainer:fullscreen {
            max-width: 100%;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            margin: 0;
            overflow-y: auto;
        }
        #chartContainer::backdrop {
            background-color: #fff;
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 text-[#333333]">

    <div id="chartContainer" class="max-w-7xl mx-auto bg-white p-4 md:p-8 rounded-lg shadow-md relative flex flex-col bg-white overflow-y-auto">
        
        <!-- Täisekraani nupp -->
        <button id="fsBtn" class="absolute top-4 right-4 md:top-8 md:right-8 p-2 bg-gray-100 hover:bg-gray-200 rounded text-[#333333] transition-colors z-10" title="Täisekraan / Välju">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M5.828 10.172a.5.5 0 0 0-.707 0l-4.096 4.096V11.5a.5.5 0 0 0-1 0v3.975a.5.5 0 0 0 .5.5H4.5a.5.5 0 0 0 0-1H1.732l4.096-4.096a.5.5 0 0 0 0-.707zm4.344 0a.5.5 0 0 1 .707 0l4.096 4.096V11.5a.5.5 0 1 1 1 0v3.975a.5.5 0 0 1-.5.5H11.5a.5.5 0 0 1 0-1h2.768l-4.096-4.096a.5.5 0 0 1 0-.707zm0-4.344a.5.5 0 0 0 .707 0l4.096-4.096V4.5a.5.5 0 1 0 1 0V.525a.5.5 0 0 0-.5-.5H11.5a.5.5 0 0 0 0 1h2.768l-4.096 4.096a.5.5 0 0 0 0 .707zm-4.344 0a.5.5 0 0 1-.707 0L1.732 1.732V4.5a.5.5 0 0 1-1 0V.525a.5.5 0 0 1 .5-.5H4.5a.5.5 0 0 1 0 1H1.732l4.096 4.096a.5.5 0 0 1 0 .707z"/>
            </svg>
        </button>

        <h1 class="text-[18pt] font-bold mb-8 text-left text-[#333333] pr-12 font-['Fira_Sans']">Toetus Arnold Rüütlile 10 palli skaalal</h1>
        
        <div class="flex flex-col mb-4 w-full">
            <div class="relative w-full h-[450px]">
                <canvas id="ruutelBarChart"></canvas>
            </div>
        </div>

        <div id="errorLog" class="text-red-600 font-mono mt-4 text-sm whitespace-pre-wrap"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // Globaalsed parameetrid nullimudeli vältimiseks
                Chart.defaults.font.family = "'Fira Sans', sans-serif";
                Chart.defaults.color = '#333333';

                Chart.register(ChartDataLabels);

                const commonFont = { family: "'Fira Sans', sans-serif" };
                const axisTitleFont = { family: "'Fira Sans', sans-serif", weight: 'bold', size: 21 }; // ~16pt
                const textColor = '#333333';
                const estonianBlue = '#0072CE';

                // Toorandmed visuaalselt kohutavast tabelist, aastad parandatud ja pandud vaatlusperioodi lõppu
                const dataRaw = [
                    { label: '17.10-24.10.2001', value: 7.25 },
                    { label: '31.10-07.11.2001', value: 7.00 },
                    { label: '14.11-21.11.2001', value: 7.51 },
                    { label: '28.11-05.12.2001', value: 7.02 },
                    { label: '12.12-19.12.2001', value: 6.89 },
                    { label: '09.01-16.01.2002', value: 6.90 },
                    { label: '23.01-30.01.2002', value: 6.90 },
                    { label: '20.02-27.02.2002', value: 7.21 },
                    { label: '06.03-13.03.2002', value: 6.55 },
                    { label: '20.03-27.03.2002', value: 6.73 },
                    { label: '03.04-10.04.2002', value: 7.11 },
                    { label: '17.04-24.04.2002', value: 6.81 },
                    { label: '01.05-08.05.2002', value: 7.04 },
                    { label: '15.05-22.05.2002', value: 7.07 },
                    { label: '07.08-14.08.2002', value: 7.04 },
                    { label: '21.08-28.08.2002', value: 6.96 },
                    { label: '04.09-11.09.2002', value: 6.83 },
                    { label: '18.09-25.09.2002', value: 6.75 },
                    { label: '02.10-09.10.2002', value: 6.76 },
                    { label: '16.10-23.10.2002', value: 6.78 },
                    { label: '30.10-06.11.2002', value: 6.83 },
                    { label: '13.11-20.11.2002', value: 6.98 },
                    { label: '27.11-04.12.2002', value: 6.93 },
                    { label: '11.12-18.12.2002', value: 6.82 },
                    { label: '08.01-15.01.2003', value: 6.98 },
                    { label: '22.01-29.01.2003', value: 7.05 },
                    { label: '05.02-19.02.2003', value: 6.70 },
                    { label: '19.02-26.02.2003', value: null },
                    { label: '05.03-12.03.2003', value: null },
                    { label: '19.03-26.03.2003', value: null },
                    { label: '16.04-24.04.2003', value: null },
                    { label: '30.04-14.05.2003', value: 7.06 },
                    { label: '14.05-28.05.2003', value: 7.07 },
                    { label: '28.05-18.09.2003', value: 7.10 },
                    { label: '18.09-24.09.2003', value: 7.08 },
                    { label: '24.09.2003', value: 6.99 }
                ];

                const ctx = document.getElementById('ruutelBarChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: dataRaw.map(d => d.label),
                        datasets: [
                            {
                                label: 'Keskväärtus 10 palli skaalal',
                                data: dataRaw.map(d => d.value),
                                backgroundColor: function(context) {
                                    const chart = context.chart;
                                    const {ctx, chartArea} = chart;
                                    
                                    // Tagavara, kui chartArea pole veel initsialiseeritud
                                    if (!chartArea) return estonianBlue;
                                    
                                    // Loome sujuva gradiendi kogu graafiku joonistusala ulatuses
                                    const gradient = ctx.createLinearGradient(chartArea.left, 0, chartArea.right, 0);
                                    gradient.addColorStop(0, '#80B9E7'); // Heledam, natuke pestud sinine
                                    gradient.addColorStop(1, '#002244'); // Kuri ja tume sügavsinine
                                    
                                    return gradient;
                                },
                                borderRadius: 2,
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            // Suurendatud top padding, et vertikaalsed numbrid lakke kinni ei jookseks
                            padding: { top: 40 }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 10,
                                grid: { color: '#e5e7eb' },
                                title: { display: true, text: 'Toetus (1-10)', font: axisTitleFont, color: textColor },
                                ticks: { font: commonFont, color: textColor }
                            },
                            x: {
                                grid: { display: false },
                                title: { display: true, text: 'Küsitlusperiood', font: axisTitleFont, color: textColor },
                                ticks: { 
                                    font: commonFont, 
                                    color: textColor,
                                    maxRotation: 45,
                                    minRotation: 45
                                }
                            }
                        },
                        plugins: {
                            legend: { 
                                display: false // Pealkiri ja Y-telg juba seletavad asja ära
                            },
                            tooltip: {
                                backgroundColor: 'rgba(51, 51, 51, 0.9)',
                                titleFont: commonFont,
                                bodyFont: commonFont,
                                callbacks: { 
                                    label: function(context) { 
                                        if (context.parsed.y === null) return ' Andmed puuduvad';
                                        // Asendame punkti komaga, nagu Eestis kombeks
                                        return ` Toetus: ${context.parsed.y.toString().replace('.', ',')}`; 
                                    } 
                                }
                            },
                            datalabels: {
                                color: textColor,
                                anchor: 'end',
                                align: 'top',
                                rotation: -90, // Pöörame sildid vertikaalseks, et nad üksteist ei märgistaks
                                offset: 4, // Lükkame veidi tulpade tipust eemale
                                font: { family: "'Fira Sans', sans-serif", weight: 'bold', size: 11 },
                                formatter: function(value) { 
                                    if (value === null) return '';
                                    return value.toString().replace('.', ','); 
                                }
                            }
                        },
                        interaction: { mode: 'index', intersect: false }
                    }
                });

                // Täisekraani nupu loogika
                const fsBtn = document.getElementById('fsBtn');
                const container = document.getElementById('chartContainer');

                fsBtn.addEventListener('click', () => {
                    if (!document.fullscreenElement) {
                        if (container.requestFullscreen) {
                            container.requestFullscreen().catch(err => {
                                console.warn(`Viga täisekraani avamisel: ${err.message}`);
                            });
                        }
                    } else {
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        }
                    }
                });
        
            } catch (error) {
                document.getElementById('errorLog').textContent = "Graafiku laadimine jooksis kokku:\n" + error.stack;
                console.error(error);
            }
        });
    </script>
</body>
</html>
