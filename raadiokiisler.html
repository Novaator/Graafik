<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERR Graafikusüsteem</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    // Sunnime Babelit kasutama klassikalist JSX-i, et vältida brauseri moodulite konflikti
    Babel.registerPreset('kloonimiskindel', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
    body, * {
      font-family: 'Fira Sans', sans-serif !important;
    }
    /* Visuaalne indikaator, kui elementi lohistatakse üle lahtri */
    .drag-over {
      background-color: #f0f9ff !important;
      border-color: #7dd3fc !important;
    }
    @media print {
      @page { size: landscape; margin: 10mm; }
      body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .print\:hidden { display: none !important; }
      .print\:col-span-full { grid-column: 1 / -1 !important; }
      .overflow-x-auto { overflow-x: visible !important; }
      .shadow-sm { box-shadow: none !important; }
      .bg-gray-100 { background-color: white !important; }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="kloonimiskindel">
    const { useState, useEffect, useMemo } = React;
    const { createRoot } = ReactDOM;
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // --- IKOONID ---
    const Calendar = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
    const User = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
    const Plus = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const XIcon = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const AlertTriangle = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
    const Activity = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const Printer = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const Sun = ({size=20, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;

    // --- FIREBASE SEADED ---
    const firebaseConfig = {
      apiKey: "AIzaSyBbRL3C8EvPfrGeW6lObwixyu8aTb8iBZE",
  authDomain: "raadiokiisler.firebaseapp.com",
  projectId: "raadiokiisler",
  storageBucket: "raadiokiisler.firebasestorage.app",
  messagingSenderId: "91326686424",
  appId: "1:91326686424:web:a364b04ff15b275827a3ad"
    };

    let app, auth, db;
    let isFirebaseConfigured = false;
    
    if (firebaseConfig.apiKey !== "SINU_API_KEY" && firebaseConfig.apiKey !== "SINU_PÄRIS_API_KEY") {
      try {
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        isFirebaseConfigured = true;
      } catch (e) {
        console.error("Firebase initsialiseerimine ebaõnnestus:", e);
      }
    }

    // --- KONSTANDID JA VÄRVID ---
    const ROLES = ["PIKAD", "HOMMIK", "ÕHTU", "REPORTER", "KULTUUR", "TARTU", "VÄLIS", "TOIMETAJA"];
    const DAYS = ['E', 'T', 'K', 'N', 'R', 'L', 'P'];
    const YEARS = ['2026', '2027', '2028'];

    const stringToHash = (str) => {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return Math.abs(hash);
    };
    const getPaleColor = (name) => `hsl(${stringToHash(name) % 360}, 50%, 93%)`;
    const getDarkColor = (name) => `hsl(${stringToHash(name) % 360}, 65%, 25%)`;

    // Dünaamiline ISO nädalate generaator soovitud aasta jaoks
    const generateWeeksForYear = (yearNum) => {
      const weeks = [];
      const jan4 = new Date(yearNum, 0, 4, 12, 0, 0);
      const day = jan4.getDay() || 7;
      const startOfW1 = new Date(jan4);
      startOfW1.setDate(jan4.getDate() - day + 1);

      let currentDate = new Date(startOfW1);
      let weekNum = 1;

      while (true) {
        const thursday = new Date(currentDate);
        thursday.setDate(currentDate.getDate() + 3);
        if (thursday.getFullYear() > yearNum) break;

        const startStr = `${currentDate.getDate().toString().padStart(2, '0')}.${(currentDate.getMonth() + 1).toString().padStart(2, '0')}`;
        const endOfWeek = new Date(currentDate);
        endOfWeek.setDate(currentDate.getDate() + 6);
        const endStr = `${endOfWeek.getDate().toString().padStart(2, '0')}.${(endOfWeek.getMonth() + 1).toString().padStart(2, '0')}`;
        const monthName = new Intl.DateTimeFormat('et-EE', { month: 'long' }).format(endOfWeek);

        weeks.push({
          id: `W${weekNum}`,
          label: `Nädal ${weekNum} (${startStr} - ${endStr})`,
          month: monthName.charAt(0).toUpperCase() + monthName.slice(1),
          startMs: currentDate.getTime()
        });

        currentDate.setDate(currentDate.getDate() + 7);
        weekNum++;
      }
      return weeks;
    };

    function App() {
      const [user, setUser] = useState(null);
      const [dbData, setDbData] = useState({ employees: ['VOLTRI', 'PÕLENDIK', 'SALME', 'OTSMAA'], schedule: {}, vacations: {} });
      const [selectedYear, setSelectedYear] = useState('2026');
      
      const activeWeeks = useMemo(() => generateWeeksForYear(parseInt(selectedYear)), [selectedYear]);
      const [selectedWeek, setSelectedWeek] = useState(activeWeeks[0].id);
      
      const [newEmployeeName, setNewEmployeeName] = useState('');
      const [vacationInput, setVacationInput] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [loading, setLoading] = useState(isFirebaseConfigured);
      
      const [dragTargetCell, setDragTargetCell] = useState(null);

      useEffect(() => {
        if (!isFirebaseConfigured) {
          setErrorMsg("TÄHELEPANU! Firebase pole seadistatud. Andmed ei salvestu pilve! Muuda koodis firebaseConfig parameetreid.");
          return;
        }
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            setErrorMsg(`Autentimine ebaõnnestus (${err.code}).`);
            setLoading(false);
          }
        };
        initAuth();
        const unsubscribeAuth = onAuthStateChanged(auth, setUser);
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        setSelectedWeek(activeWeeks[0].id);
      }, [selectedYear, activeWeeks]);

      useEffect(() => {
        if (!user || !isFirebaseConfigured) return;
        setLoading(true);
        const docRef = doc(db, 'err_data', `graafik_${selectedYear}`);
        
        const unsubscribeDb = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (!data.vacations) data.vacations = {};
            setDbData(data);
          } else {
            const initialData = { employees: ['VOLTRI', 'PÕLENDIK', 'SALME', 'OTSMAA'], schedule: {}, vacations: {} };
            setDoc(docRef, initialData).catch(console.error);
            setDbData(initialData);
          }
          setLoading(false);
        }, (err) => {
          setErrorMsg(`Andmebaasi viga (${err.code}). Kontrolli Firestore'i turvareegleid.`);
          setLoading(false);
        });

        return () => unsubscribeDb();
      }, [user, selectedYear]);

      const saveToDb = async (newData) => {
        if (!isFirebaseConfigured) {
          setDbData(newData);
          return;
        }
        if (!user) return;
        try {
          const docRef = doc(db, 'err_data', `graafik_${selectedYear}`);
          await setDoc(docRef, newData, { merge: true });
        } catch (err) {
          setErrorMsg(`Salvestamine ebaõnnestus: ${err.code}.`);
        }
      };

      const handleAddEmployee = (e) => {
        e.preventDefault();
        const name = newEmployeeName.trim().toUpperCase();
        if (!name || dbData.employees.includes(name)) return;
        const newData = { ...dbData, employees: [...dbData.employees, name].sort((a,b) => a.localeCompare(b, 'et')) };
        saveToDb(newData);
        setNewEmployeeName('');
      };

      const handleRemoveEmployee = (name) => {
        const newData = { ...dbData, employees: dbData.employees.filter(e => e !== name) };
        saveToDb(newData);
      };

      const showTempError = (msg) => {
        setErrorMsg(msg);
        setTimeout(() => { if(isFirebaseConfigured) setErrorMsg('') }, 5000);
      };

      // --- PUHKUSTE LOGIKA ---
      const handleSaveVacations = () => {
        if (!vacationInput.trim()) return;
        const lines = vacationInput.split('\n').map(l => l.trim()).filter(l => l);
        const newVacations = { ...(dbData.vacations || {}) };
        let currentEmp = null;
        let added = 0;
        
        lines.forEach(line => {
          const upperLine = line.toUpperCase();
          if (dbData.employees.includes(upperLine)) {
            currentEmp = upperLine;
            if (!newVacations[currentEmp]) newVacations[currentEmp] = [];
          } else if (currentEmp) {
            const match = line.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})\s*-\s*(\d{1,2})\.(\d{1,2})\.(\d{4})/);
            if (match) {
              const [_, d1, m1, y1, d2, m2, y2] = match;
              const startMs = new Date(y1, m1 - 1, d1, 12, 0, 0).getTime();
              const endMs = new Date(y2, m2 - 1, d2, 12, 0, 0).getTime();
              const startStr = `${d1.padStart(2, '0')}.${m1.padStart(2, '0')}.${y1}`;
              const endStr = `${d2.padStart(2, '0')}.${m2.padStart(2, '0')}.${y2}`;

              const isDup = newVacations[currentEmp].some(v => v.start === startStr && v.end === endStr);
              if (!isDup) {
                newVacations[currentEmp].push({ start: startStr, end: endStr, startMs, endMs });
                added++;
              }
            }
          }
        });

        if (added > 0) {
          saveToDb({ ...dbData, vacations: newVacations });
          setVacationInput('');
        } else {
          showTempError('Ei tuvastanud ühtegi korrektset puhkust. Kontrolli nimesid ja formaati.');
        }
      };

      const handleClearVacations = (emp) => {
        const newVacations = { ...dbData.vacations };
        delete newVacations[emp];
        saveToDb({ ...dbData, vacations: newVacations });
      };

      // --- LOHISTAMISE (DRAG & DROP) LOGIKA ---
      const handleDrop = (e, targetDayIdx, targetRole) => {
        e.preventDefault();
        setDragTargetCell(null);
        
        const dataStr = e.dataTransfer.getData("application/json");
        if (!dataStr) return;
        
        const { name, sourceDayIdx, sourceRole } = JSON.parse(dataStr);
        if (sourceDayIdx === targetDayIdx && sourceRole === targetRole) return; // Lohistati samasse kohta

        const currentWeekSchedule = dbData.schedule[selectedWeek] || {};
        const targetDaySchedule = currentWeekSchedule[targetDayIdx] || {};

        // 1. Konfliktikontroll sihtpäeval
        let hasConflict = false;
        let conflictRole = '';

        Object.entries(targetDaySchedule).forEach(([role, persons]) => {
          // Ignoreerime algallikat juhul, kui tõstame isikut samal päeval ühest rollist teise
          if (role !== targetRole && !(sourceDayIdx === targetDayIdx && role === sourceRole)) {
            if (persons.includes(name)) {
              hasConflict = true;
              conflictRole = role;
            }
          }
        });

        if (hasConflict) {
          showTempError(`Füüsikaviga! ${name} on sel päeval juba rollis "${conflictRole}". Bioloogiline kloonimine on keelatud.`);
          return;
        }

        // Kontroll, kas on juba antud rollis
        if ((targetDaySchedule[targetRole] || []).includes(name)) return;

        // 2. Viime muudatuse sisse
        let newSchedule = { ...dbData.schedule };
        if (!newSchedule[selectedWeek]) newSchedule[selectedWeek] = {};
        
        // Eemaldame algallikast, kui see eksisteeris (tõsteti ühest lahtrist teise)
        if (sourceDayIdx !== null && sourceRole !== null) {
          if (!newSchedule[selectedWeek][sourceDayIdx]) newSchedule[selectedWeek][sourceDayIdx] = {};
          const sourcePersons = newSchedule[selectedWeek][sourceDayIdx][sourceRole] || [];
          newSchedule[selectedWeek][sourceDayIdx][sourceRole] = sourcePersons.filter(p => p !== name);
        }

        // Lisame uude kohta
        if (!newSchedule[selectedWeek][targetDayIdx]) newSchedule[selectedWeek][targetDayIdx] = {};
        const targetPersons = newSchedule[selectedWeek][targetDayIdx][targetRole] || [];
        newSchedule[selectedWeek][targetDayIdx][targetRole] = [...targetPersons, name].sort((a,b) => a.localeCompare(b, 'et'));

        saveToDb({ ...dbData, schedule: newSchedule });
      };

      const handleRemovePerson = (dayIdx, role, personName) => {
        const currentWeekSchedule = dbData.schedule[selectedWeek] || {};
        const daySchedule = currentWeekSchedule[dayIdx] || {};
        const existingPersonsInRole = daySchedule[role] || [];
        
        const newData = {
          ...dbData,
          schedule: {
            ...dbData.schedule,
            [selectedWeek]: {
              ...currentWeekSchedule,
              [dayIdx]: {
                ...daySchedule,
                [role]: existingPersonsInRole.filter(p => p !== personName)
              }
            }
          }
        };
        saveToDb(newData);
      };

      const currentMonthData = useMemo(() => {
        const activeWeekObj = activeWeeks.find(w => w.id === selectedWeek);
        if (!activeWeekObj) return null;

        const activeMonth = activeWeekObj.month;
        const weeksInMonth = activeWeeks.filter(w => w.month === activeMonth).map(w => w.id);
        const stats = {}; 
        
        dbData.employees.forEach(emp => {
          stats[emp] = { total: 0, roles: {} };
          ROLES.forEach(r => stats[emp].roles[r] = 0);
        });

        weeksInMonth.forEach(weekId => {
          const weekSched = dbData.schedule[weekId] || {};
          Object.values(weekSched).forEach(daySched => {
            Object.entries(daySched).forEach(([role, persons]) => {
              persons.forEach(person => {
                if (stats[person]) {
                  stats[person].roles[role]++;
                  stats[person].total++;
                }
              });
            });
          });
        });

        return { month: activeMonth, stats };
      }, [selectedWeek, dbData]);

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col gap-4 items-center justify-center bg-gray-50 font-sans text-gray-700">
            <svg className="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <p className="font-semibold">Laen andmeid pilvest...</p>
          </div>
        );
      }

      return (
        <div className="p-4 md:p-8 max-w-[1400px] mx-auto space-y-6">
          
          <header className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h1 className="text-2xl font-bold mb-1 flex items-center gap-2">
                <Calendar className="text-blue-600" /> Graafikugeneraator
              </h1>
              <p className="text-sm text-gray-500">Teaduspõhine ja kloonimiskindel ressursside jaotussüsteem.</p>
            </div>

            <div className="w-full md:w-auto flex flex-col md:flex-row gap-3 print:hidden">
              <button 
                onClick={() => window.print()}
                className="flex items-center justify-center gap-2 bg-slate-800 text-white px-4 py-2.5 rounded-md font-semibold hover:bg-slate-700 transition-colors shadow-sm"
              >
                <Printer size={18} /> Prindi / PDF
              </button>
              
              <div className="flex gap-2 w-full md:w-auto">
                <select 
                  value={selectedYear}
                  onChange={(e) => setSelectedYear(e.target.value)}
                  className="rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2.5 border bg-gray-50 font-medium cursor-pointer"
                >
                  {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
                </select>

                <select 
                  value={selectedWeek}
                  onChange={(e) => setSelectedWeek(e.target.value)}
                  className="flex-1 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2.5 border bg-gray-50 font-medium cursor-pointer"
                >
                  {activeWeeks.map(w => (
                    <option key={w.id} value={w.id}>{w.label} - {w.month}</option>
                  ))}
                </select>
              </div>
            </div>
          </header>

          {errorMsg && (
            <div className={`p-4 rounded-md shadow-sm flex items-start gap-3 print:hidden ${isFirebaseConfigured ? 'bg-red-50 border-l-4 border-red-500 text-red-800' : 'bg-orange-50 border-l-4 border-orange-500 text-orange-800'}`}>
              <AlertTriangle size={20} className="shrink-0 mt-0.5" />
              <p className="font-semibold text-sm">{errorMsg}</p>
            </div>
          )}

          <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">
            <div className="xl:col-span-1 space-y-6 print:hidden">
              
              {/* TÖÖTAJATE REGISTER */}
              <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2">
                  <User size={18} /> Töötajate register
                </h2>
                
                <form onSubmit={handleAddEmployee} className="flex gap-2 mb-4">
                  <input 
                    type="text" 
                    value={newEmployeeName}
                    onChange={(e) => setNewEmployeeName(e.target.value)}
                    placeholder="Uus nimi..." 
                    className="flex-1 rounded-md border-gray-300 shadow-sm border p-2 text-sm uppercase"
                  />
                  <button type="submit" className="bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700">
                    <Plus size={18} />
                  </button>
                </form>

                <p className="text-xs text-gray-500 mb-3 italic">Lohista nimi siit otse graafikusse.</p>

                <div className="flex flex-wrap gap-2 max-h-[250px] overflow-y-auto">
                  {[...dbData.employees].sort((a,b) => a.localeCompare(b, 'et')).map(emp => (
                    <span 
                      key={emp} 
                      draggable="true"
                      onDragStart={(e) => {
                        e.dataTransfer.setData("application/json", JSON.stringify({ name: emp, sourceDayIdx: null, sourceRole: null }));
                        e.dataTransfer.effectAllowed = "all";
                      }}
                      className="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-md text-xs font-bold border cursor-grab hover:opacity-80 transition-opacity shadow-sm"
                      style={{ backgroundColor: getPaleColor(emp), color: getDarkColor(emp), borderColor: 'rgba(0,0,0,0.1)' }}
                    >
                      {emp}
                      <button onClick={() => handleRemoveEmployee(emp)} className="opacity-40 hover:opacity-100 hover:text-red-600 ml-1">
                        <XIcon size={14} />
                      </button>
                    </span>
                  ))}
                </div>
              </div>

              {/* PUHKUSTE REGISTER */}
              <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2">
                  <Sun size={18} /> Puhkuste register
                </h2>
                <p className="text-xs text-gray-500 mb-2">
                  Kleebi andmed kujul:<br/>
                  <span className="font-mono bg-gray-50 p-1 block mt-1 border border-gray-100 rounded">
                    VOLTRI<br/>
                    21.03.2026 - 24.03.2026<br/>
                    01.05.2026 - 03.05.2026
                  </span>
                </p>
                
                <textarea 
                  value={vacationInput}
                  onChange={(e) => setVacationInput(e.target.value)}
                  placeholder="Kopeeri siia..." 
                  className="w-full rounded-md border-gray-300 shadow-sm border p-2 text-sm h-24 mb-3 font-mono text-xs"
                />
                <button 
                  onClick={handleSaveVacations}
                  className="w-full bg-slate-800 text-white p-2.5 rounded-md hover:bg-slate-700 font-semibold text-sm mb-4 transition-colors"
                >
                  Salvesta süsteemi
                </button>

                <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                  {Object.entries(dbData.vacations || {}).map(([emp, vacs]) => vacs.length > 0 && (
                    <div key={emp} className="text-sm border border-gray-100 rounded-md p-2.5 bg-gray-50">
                      <div className="font-bold text-gray-800 flex justify-between items-center mb-1.5">
                        {emp}
                        <button onClick={() => handleClearVacations(emp)} className="text-red-500 hover:text-red-700 text-xs font-semibold">
                          Tühjenda
                        </button>
                      </div>
                      {vacs.map((v, i) => (
                        <div key={i} className="text-[11px] font-mono text-gray-600 bg-white border border-gray-200 px-2 py-1 rounded mb-1">
                          {v.start} - {v.end}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>

            </div>

            {/* MAATRIKS */}
            <div className="xl:col-span-4 bg-white p-5 rounded-xl shadow-sm border border-gray-200 overflow-x-auto print:col-span-full print:shadow-none print:border-none print:p-0">
              <h2 className="text-lg font-bold mb-4 border-b pb-2 print:hidden">Nädalagraafik (lohistatav)</h2>
              
              <div className="min-w-[900px]">
                <div className="grid grid-cols-8 gap-2 mb-2">
                  <div className="font-bold text-gray-500 text-sm uppercase p-2 flex items-end">ROLL</div>
                  {DAYS.map((day, idx) => {
                    const activeWeekObj = activeWeeks.find(w => w.id === selectedWeek);
                    const d = new Date(activeWeekObj.startMs + idx * 86400000);
                    const dateStr = `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}`;
                    return (
                      <div key={idx} className="text-center bg-gray-50 py-1.5 rounded-t-md border-b-2 border-gray-200">
                        <div className="font-bold text-gray-800 text-base">{day}</div>
                        <div className="text-xs font-semibold text-gray-500">{dateStr}</div>
                      </div>
                    );
                  })}
                </div>

                {ROLES.map(role => (
                  <div key={role} className="grid grid-cols-8 gap-2 mb-2">
                    <div className="font-bold text-sm p-2 flex items-center bg-blue-50/50 rounded-md text-blue-900 border border-blue-100 uppercase tracking-wide">
                      {role}
                    </div>
                    
                    {DAYS.map((_, dayIdx) => {
                      const assignedPersons = dbData.schedule[selectedWeek]?.[dayIdx]?.[role] || [];
                      const isDragOver = dragTargetCell === `${dayIdx}-${role}`;
                      const activeWeekObj = activeWeeks.find(w => w.id === selectedWeek);
                      const cellDateMs = activeWeekObj.startMs + (dayIdx * 24 * 60 * 60 * 1000);

                      return (
                        <div 
                          key={dayIdx} 
                          onDragOver={(e) => { 
                            e.preventDefault(); 
                            e.dataTransfer.dropEffect = "move"; 
                            setDragTargetCell(`${dayIdx}-${role}`);
                          }}
                          onDragLeave={() => setDragTargetCell(null)}
                          onDrop={(e) => handleDrop(e, dayIdx, role)}
                          className={`border rounded-md p-1 min-h-[60px] transition-all flex flex-col gap-1 ${isDragOver ? 'drag-over border-blue-400 border-dashed bg-blue-50' : 'border-gray-200 bg-white hover:border-gray-300'}`}
                        >
                          {assignedPersons.map(person => {
                            const isOnVacation = (dbData.vacations?.[person] || []).some(v => cellDateMs >= v.startMs && cellDateMs <= v.endMs);
                            return (
                              <div 
                                key={person} 
                                draggable="true"
                                onDragStart={(e) => {
                                  e.dataTransfer.setData("application/json", JSON.stringify({ name: person, sourceDayIdx: dayIdx, sourceRole: role }));
                                  e.dataTransfer.effectAllowed = "move";
                                }}
                                className={`flex items-center justify-between text-xs px-1.5 py-1.5 rounded shadow-sm cursor-grab border ${isOnVacation ? 'opacity-50 grayscale' : 'hover:opacity-90'}`}
                                style={{ backgroundColor: getPaleColor(person), color: getDarkColor(person), borderColor: 'rgba(0,0,0,0.1)' }}
                              >
                                <span className="font-bold truncate flex items-center gap-1">
                                  {isOnVacation && <Sun size={12} className="shrink-0" />}
                                  {person}
                                </span>
                                <button 
                                  onClick={(e) => { e.stopPropagation(); handleRemovePerson(dayIdx, role, person); }} 
                                  className="opacity-40 hover:opacity-100 hover:text-red-600 shrink-0 ml-1 print:hidden"
                                >
                                  <XIcon size={14} />
                                </button>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          </div>

          {currentMonthData && (
            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 overflow-x-auto print:hidden">
              <h2 className="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2">
                <Activity size={18} /> Koormuse aruanne ({currentMonthData.month})
              </h2>
              <div className="min-w-[800px]">
                <table className="w-full text-sm text-left">
                  <thead className="bg-gray-50 text-gray-600 uppercase text-xs">
                    <tr>
                      <th className="py-3 px-4 font-bold border-b">NIMI</th>
                      {ROLES.map(r => <th key={r} className="py-3 px-2 font-bold border-b text-center">{r}</th>)}
                      <th className="py-3 px-4 font-bold border-b text-center text-blue-700">KOKKU</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {Object.entries(currentMonthData.stats)
                      .sort((a, b) => b[1].total - a[1].total)
                      .map(([person, data]) => (
                      <tr key={person} className="hover:bg-gray-50 transition-colors">
                        <td className="py-2 px-4 font-bold text-gray-800 flex items-center gap-2">
                          <div className="w-2.5 h-2.5 rounded-full border border-black/10" style={{ backgroundColor: getPaleColor(person) }}></div>
                          {person}
                        </td>
                        {ROLES.map(r => (
                          <td key={r} className={`py-2 px-2 text-center ${data.roles[r] > 0 ? 'text-gray-900 font-bold' : 'text-gray-300'}`}>
                            {data.roles[r] || '-'}
                          </td>
                        ))}
                        <td className="py-2 px-4 text-center font-bold text-blue-600 text-base bg-blue-50/30">
                          {data.total}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
