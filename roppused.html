<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eestlaste roppsõnade anatoomia</title>
    
    <!-- Google Fonts Fira Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS kujunduse ja paigutuse jaoks -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Plotly.js Sunburst graafiku jaoks -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    
    <!-- Wordcloud2.js Sõnapilve jaoks -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    
    <!-- FontAwesome ikoonide jaoks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Väldime horisontaalset kerimist ja hoiame disaini puhtana */
        body { background-color: #f8fafc; color: #0f172a; font-family: 'Fira Sans', sans-serif; }
        .timeline-item { transition: all 0.2s ease-in-out; cursor: pointer; }
        .timeline-item:hover { transform: scale(1.05); }
        .active-timeline { border-color: #3b82f6; background-color: #eff6ff; }
        #wordcloud-container canvas { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body class="min-h-screen p-2 md:p-4">

    <div class="max-w-[670px] mx-auto space-y-8">
        
        <!-- Päis -->
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Eestlaste roppsõnade anatoomia</h1>
            <p class="text-lg text-slate-600">Kuidas muutub meie sõnavara elukaare jooksul?</p>
        </header>

        <!-- Sõnapilv (Põhigraafik) -->
        <section class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Populaarseimad väljendid (kõik vanuserühmad)</h2>
            <div id="wordcloud-container" class="w-full h-[350px] flex justify-center items-center relative overflow-hidden bg-slate-50 rounded-lg cursor-pointer">
                <canvas id="wordcloud-canvas"></canvas>
            </div>
            <div id="word-info" class="mt-4 text-center h-6 text-slate-600 font-medium text-sm">Klõpsa sõnal, et näha statistikat.</div>
        </section>

        <!-- Elukaar ja Sunburst -->
        <section class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Elukaar ja spetsiifika</h2>
            <p class="text-sm text-slate-500 mb-6">Klõpsa vanuserühmal, et näha selle põlvkonna detailseid eelistusi.</p>
            
            <!-- Ikoonide rida -->
            <div id="timeline" class="grid grid-cols-3 sm:grid-cols-6 gap-2 md:gap-4 mb-6">
                <!-- Genereeritakse JS poolt -->
            </div>

            <!-- Sunburst konteiner -->
            <div id="sunburst-wrapper" class="hidden border-t border-slate-100 pt-6 mt-4">
                <h3 id="sunburst-title" class="text-xl font-semibold text-center mb-4"></h3>
                <div id="sunburst-container" class="w-full h-[500px]"></div>
            </div>
        </section>

    </div>

    <script>
        /**
         * 1. ANDMED
         * Kopeeri oma täielik Vihik1.csv sisu siia muutujasse. 
         * Hetkel on siin esinduslik valik sinu andmetest, et graafikud kohe töötaksid.
         */
        const csvData = `fraas;10-19;20-29;30-39;40-49;50-59;60+;kokku
fakk;19;40;39;13;2;0;113
fuck;27;44;49;24;6;1;151
fucking;3;11;12;2;1;1;30
hui;6;10;5;4;1;0;26
krt;12;16;15;16;7;0;66
kuradi;2;7;8;5;1;1;24
kurat;29;50;99;100;48;14;340
kurat küll;1;3;7;8;1;0;20
lits;6;6;4;3;2;0;21
mida vittu;12;13;4;0;1;0;30
munn;5;14;29;11;4;0;63
mv;9;12;0;0;0;0;21
nahhui;19;24;15;3;0;0;61
nahui;2;12;5;2;2;0;23
pagan;2;2;9;16;3;0;32
pask;3;10;18;4;1;0;36
pede;13;11;6;2;0;0;32
pekki;8;12;6;8;4;1;39
perse;15;37;70;43;22;8;195
persse;26;57;100;78;38;11;310
tra;67;78;40;10;2;0;197
vittu;15;25;15;5;1;0;61
putsi;10;20;10;2;0;0;42`;

        // Elukaare seadistused (ikoonid FontAwesome baasil)
        const ageGroupsConfig = [
            { id: '10-19', label: '10-19', icon: 'fa-child-reaching' },
            { id: '20-29', label: '20-29', icon: 'fa-graduation-cap' },
            { id: '30-39', label: '30-39', icon: 'fa-briefcase' },
            { id: '40-49', label: '40-49', icon: 'fa-house-user' },
            { id: '50-59', label: '50-59', icon: 'fa-couch' },
            { id: '60+', label: '60+', icon: 'fa-person-walking-with-cane' }
        ];

        let parsedData = [];
        let ageGroupTopWords = {};

        /**
         * 2. PARSIMINE
         */
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = lines[0].trim().split(';');
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].trim().split(';');
                if (parts.length === headers.length) {
                    let row = {};
                    headers.forEach((h, index) => {
                        row[h] = index === 0 ? parts[index] : parseInt(parts[index], 10) || 0;
                    });
                    data.push(row);
                }
            }
            return data;
        }

        /**
         * 3. SÕNAPILVE RENDERDAMINE
         */
        function renderWordCloud(data) {
            const canvas = document.getElementById('wordcloud-canvas');
            const container = document.getElementById('wordcloud-container');
            
            // Fix canvas resolution for high DPI displays
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // Filtreerime andmed ja leiame skaleerimiseks miinimum- ja maksimumväärtused
            const list = data
                .filter(d => d.kokku > 0)
                .map(d => [d.fraas, d.kokku])
                .sort((a, b) => b[1] - a[1]);

            if (list.length === 0) return;
            
            const maxVal = list[0][1];
            const minVal = list[list.length - 1][1];
            const minFontSize = 14; // Minimaalne nähtavus pt14 järgi
            const maxFontSize = 70; // Optimaalne 670px kasti jaoks

            WordCloud(canvas, {
                list: list,
                fontFamily: "'Fira Sans', sans-serif",
                fontWeight: 'bold',
                color: 'random-dark',
                backgroundColor: 'transparent',
                shrinkToFit: true,
                drawOutOfBound: false,
                weightFactor: function (size) {
                    if (maxVal === minVal) return minFontSize;
                    // Logaritmiline skaleerimine: minVal -> minFontSize, maxVal -> maxFontSize
                    const scale = (Math.log(size) - Math.log(minVal)) / (Math.log(maxVal) - Math.log(minVal));
                    return minFontSize + scale * (maxFontSize - minFontSize);
                },
                click: function(item) {
                    if(item) {
                        document.getElementById('word-info').innerHTML = 
                            `Sõna: <span class="font-bold text-slate-900 uppercase">"${item[0]}"</span> &nbsp;|&nbsp; Mainimisi: <span class="font-bold text-slate-900">${item[1]}</span>`;
                    }
                }
            });
        }

        /**
         * 4. ELUKAARE (TIMELINE) RENDERDAMINE
         */
        function renderTimeline(data) {
            const container = document.getElementById('timeline');
            container.innerHTML = '';

            ageGroupsConfig.forEach(group => {
                // Leiame grupi kõige populaarseima sõna
                let topWord = '';
                let maxCount = -1;

                data.forEach(row => {
                    if (row[group.id] > maxCount) {
                        maxCount = row[group.id];
                        topWord = row.fraas;
                    }
                });
                
                ageGroupTopWords[group.id] = topWord;

                const item = document.createElement('div');
                item.className = 'timeline-item border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center text-center bg-white shadow-sm';
                item.onclick = () => showSunburst(group.id, item);

                item.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3 text-slate-600">
                        <i class="fa-solid ${group.icon} text-xl"></i>
                    </div>
                    <div class="text-sm text-slate-500 font-medium mb-1">${group.label}</div>
                    <div class="font-bold text-slate-800 uppercase tracking-wide text-sm bg-slate-100 px-2 py-1 rounded">${topWord}</div>
                `;

                container.appendChild(item);
            });
        }

        /**
         * 5. SUNBURST RENDERDAMINE
         */
        function showSunburst(ageId, element) {
            // Uuenda aktiivse elemendi stiili
            document.querySelectorAll('.timeline-item').forEach(el => el.classList.remove('active-timeline'));
            if(element) element.classList.add('active-timeline');

            const wrapper = document.getElementById('sunburst-wrapper');
            wrapper.classList.remove('hidden');
            
            document.getElementById('sunburst-title').innerText = `Vanuserühma ${ageId} eelistused`;

            // Filtreerime null-väärtused ja võtame top 20, et graafik liiga kirjuks ei läheks
            const groupData = parsedData
                .filter(row => row[ageId] > 0)
                .sort((a, b) => b[ageId] - a[ageId])
                .slice(0, 20);

            const total = groupData.reduce((sum, row) => sum + row[ageId], 0);

            const labels = [ageId];
            const parents = [""];
            const values = [total];

            groupData.forEach(row => {
                labels.push(row.fraas);
                parents.push(ageId);
                values.push(row[ageId]);
            });

            const plotData = [{
                type: "sunburst",
                labels: labels,
                parents: parents,
                values: values,
                textinfo: "label+percent parent",
                outsidetextfont: {size: 20, color: "#377eb8"},
                leaf: {opacity: 0.8},
                marker: {line: {width: 2, color: '#ffffff'}},
                branchvalues: "total"
            }];

            const layout = {
                margin: {l: 0, r: 0, b: 0, t: 0},
                sunburstcolorway: ["#3b82f6", "#ef4444", "#10b981", "#f59e0b", "#6366f1", "#8b5cf6"],
                paper_bgcolor: 'transparent',
                plot_bgcolor: 'transparent'
            };

            Plotly.newPlot('sunburst-container', plotData, layout, {responsive: true});
        }

        /**
         * INITSIAALNE KÄIVITAMINE
         */
        window.onload = () => {
            parsedData = parseCSV(csvData);
            renderWordCloud(parsedData);
            renderTimeline(parsedData);
            
            // Re-render wordcloud akna suuruse muutumisel
            window.addEventListener('resize', () => {
                document.getElementById('wordcloud-canvas').width = document.getElementById('wordcloud-container').clientWidth;
                document.getElementById('wordcloud-canvas').height = document.getElementById('wordcloud-container').clientHeight;
                renderWordCloud(parsedData);
            });
        };

    </script>
</body>
</html>
